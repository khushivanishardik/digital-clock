<!DOCTYPE html>
<html>
<head>
  <title>Digital Clock</title>
  <style>
  body {
    background: black;
    color: #127cd8;
    text-align: center;
    font-family: 'Courier New', monospace;
    margin-top: 100px;
  }

  #time {
    font-size: 100px;
    letter-spacing:5px;
  }

  #date {
    font-size: 50px;
    color: #127cd8;
    margin-top:20px;
  }

  h2 {
    color: white;
    margin-bottom: 30px;
  }
</style>
</head>
<body>

<h2>Digital Clock ⏰</h2>
<h1 id="time">Loading...</h1>
<h3 id="date"></h3>

<script>
function updateClock() {
  const now = new Date();

  const time = now.toLocaleTimeString();
  const day = now.toLocaleDateString('en-US', { weekday: 'long' });
  const date = now.toLocaleDateString();

  document.getElementById("time").innerText = time;
  document.getElementById("date").innerText = day + ", " + date;
}

setInterval(updateClock, 1000);
updateClock();
</script>


</body>
</html>
